<!doctype html>
<html lang="en" data-page="dashboard" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard — 10X CRM</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">

  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
</head>

<body>
  <nav class="taskbar">
    <a class="taskbar__logo" href="dashboard.html">10X CRM</a>
    <a class="nav-link" href="dashboard.html" data-nav="dashboard">Dashboard</a>
    <a class="nav-link" href="clients.html" data-nav="clients">Clients</a>
    <a class="nav-link" href="analytics.html" data-nav="analytics">Analytics</a>
    <a class="nav-link" href="profile.html" data-nav="profile">Profile</a>
    <span class="taskbar__spacer"></span>
    <button class="icon-btn" type="button" data-theme-toggle aria-label="Switch theme">☀</button>
    <button class="icon-btn" type="button" data-logout>Logout</button>
  </nav>

  <main class="shell">
    <div class="page-head">
      <div class="stack-2">
        <!-- Both filled in by js/dashboard.js: the name from the session, the
             clock from a timer that ticks every second. -->
        <div class="greeting" id="greeting"></div>
        <div class="clock" id="clock"></div>
      </div>
    </div>

    <!-- The four statistics (P3.2). Values are computed from the same client
         data the Clients page uses, so they are never out of step with it. -->
    <div class="stat-grid">
      <div class="stat">
        <div class="stat__label">Total Clients</div>
        <div class="stat__value" id="stat-total">0</div>
      </div>
      <div class="stat stat--accent">
        <div class="stat__label">Active Deals</div>
        <div class="stat__value" id="stat-active">0</div>
      </div>
      <div class="stat stat--success">
        <div class="stat__label">Won Revenue</div>
        <div class="stat__value" id="stat-revenue">$0</div>
      </div>
      <div class="stat stat--warning">
        <div class="stat__label">New This Week</div>
        <div class="stat__value" id="stat-new">0</div>
      </div>
    </div>

    <div class="dash-grid">
      <div class="window">
        <div class="window__bar"><span class="window__title">PIPELINE_OVERVIEW</span></div>
        <div class="window__body">
          <div class="pipeline" id="pipeline"
               role="img" aria-label="Deals by stage"></div>
          <div class="pipeline-legend" id="pipeline-legend"></div>
        </div>
      </div>

      <div class="window">
        <div class="window__bar"><span class="window__title">RECENT_CLIENTS</span></div>
        <div class="window__body">
          <div id="recent-list"></div>
          <a href="clients.html" style="display: inline-block; margin-top: var(--sp-4)">View all clients →</a>
        </div>
      </div>
    </div>
  </main>

  <script src="js/ui.js"></script>
  <script src="js/data.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/assistant.js"></script>
  <script src="js/atmosphere.js"></script>
</body>
</html>
